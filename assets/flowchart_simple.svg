<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 720">
  <defs>
    <style>text { font-family: 'Avenir Next','Segoe UI','Helvetica Neue',Arial,sans-serif; }</style>
    <marker id="ah" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1d2a34"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#5b6974"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="250" cy="36" rx="110" ry="26" fill="#0c6c6b"/>
  <text x="250" y="42" text-anchor="middle" fill="white" font-size="14" font-weight="700">Start</text>

  <line x1="250" y1="62" x2="250" y2="80" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- INITIALIZE -->
  <rect x="75" y="80" width="350" height="38" rx="10" fill="#edf7f7" stroke="#0c6c6b" stroke-width="2"/>
  <text x="250" y="104" text-anchor="middle" fill="#094a5c" font-size="13" font-weight="700">Initialize P* from boundary pressures</text>

  <line x1="250" y1="118" x2="250" y2="140" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══ STAGE 1 CONTAINER — teal fill makes nesting visible ══ -->
  <rect x="50" y="140" width="400" height="234" rx="12" fill="#cce8e7" stroke="#0c6c6b" stroke-width="2"/>
  <path d="M 50,152 A 12,12 0 0 1 62,140 L 438,140 A 12,12 0 0 1 450,152 L 450,172 L 50,172 Z" fill="#0c6c6b"/>
  <text x="250" y="162" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">STAGE 1 — LAMINAR</text>

  <!-- Sub-box A inside Stage 1 -->
  <rect x="80" y="182" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="205" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Estimate V* — laminar element laws</text>

  <line x1="250" y1="218" x2="250" y2="230" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Sub-box B inside Stage 1 -->
  <rect x="80" y="232" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="255" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Compute mass-flux residual bC</text>

  <line x1="250" y1="268" x2="250" y2="280" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Sub-box C inside Stage 1 -->
  <rect x="80" y="282" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="305" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Solve for P′ · Update P and V</text>

  <line x1="250" y1="318" x2="250" y2="332" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Stage 1 decision -->
  <polygon points="250,338 295,356 250,374 205,356" fill="white" stroke="#0c6c6b" stroke-width="1.5"/>
  <text x="250" y="353" text-anchor="middle" fill="#1d2a34" font-size="11.5" font-weight="700">Converged?</text>

  <!-- Loop-back Stage 1 -->
  <path d="M 295,356 L 445,356 L 445,200 L 420,200" fill="none" stroke="#5b6974" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahm)"/>
  <text x="448" y="282" fill="#5b6974" font-size="11" font-weight="600">No</text>

  <!-- Arrow Stage 1 → Stage 2 -->
  <line x1="250" y1="374" x2="250" y2="396" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="257" y="388" fill="#5b6974" font-size="11" font-weight="600">Yes</text>

  <!-- ══ STAGE 2 CONTAINER — blue fill ══ -->
  <rect x="50" y="398" width="400" height="234" rx="12" fill="#c8d8e8" stroke="#094a5c" stroke-width="2"/>
  <path d="M 50,410 A 12,12 0 0 1 62,398 L 438,398 A 12,12 0 0 1 450,410 L 450,430 L 50,430 Z" fill="#094a5c"/>
  <text x="250" y="420" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">STAGE 2 — NONLINEAR</text>

  <!-- Sub-box A inside Stage 2 -->
  <rect x="80" y="440" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="463" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Estimate V* — nonlinear element laws</text>

  <line x1="250" y1="476" x2="250" y2="488" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Sub-box B inside Stage 2 -->
  <rect x="80" y="490" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="513" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Compute mass-flux residual bC</text>

  <line x1="250" y1="526" x2="250" y2="538" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Sub-box C inside Stage 2 -->
  <rect x="80" y="540" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="563" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Solve for P′ · Update P and V</text>

  <line x1="250" y1="576" x2="250" y2="590" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Stage 2 decision -->
  <polygon points="250,596 295,614 250,632 205,614" fill="white" stroke="#094a5c" stroke-width="1.5"/>
  <text x="250" y="611" text-anchor="middle" fill="#1d2a34" font-size="11.5" font-weight="700">Converged?</text>

  <!-- Loop-back Stage 2 -->
  <path d="M 295,614 L 445,614 L 445,458 L 420,458" fill="none" stroke="#5b6974" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahm)"/>
  <text x="448" y="540" fill="#5b6974" font-size="11" font-weight="600">No</text>

  <!-- Arrow Stage 2 → Output -->
  <line x1="250" y1="632" x2="250" y2="654" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="257" y="646" fill="#5b6974" font-size="11" font-weight="600">Yes</text>

  <!-- OUTPUT -->
  <ellipse cx="250" cy="682" rx="110" ry="26" fill="#0c6c6b"/>
  <text x="250" y="688" text-anchor="middle" fill="white" font-size="14" font-weight="700">Output — P, V, ṁ</text>
</svg>
