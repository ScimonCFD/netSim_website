<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 702">
  <defs>
    <style>text { font-family: 'Avenir Next','Segoe UI','Helvetica Neue',Arial,sans-serif; }</style>
    <marker id="ah" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1d2a34"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#5b6974"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="250" cy="36" rx="110" ry="26" fill="#0c6c6b"/>
  <text x="250" y="42" text-anchor="middle" fill="white" font-size="14" font-weight="700">Start</text>
  <line x1="250" y1="62" x2="250" y2="80" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- INITIALIZE -->
  <rect x="75" y="80" width="350" height="38" rx="10" fill="#edf7f7" stroke="#0c6c6b" stroke-width="2"/>
  <text x="250" y="104" text-anchor="middle" fill="#094a5c" font-size="13" font-weight="700">Initialize P* from boundary pressures</text>
  <line x1="250" y1="118" x2="250" y2="140" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══ STAGE 1 CONTAINER ══ -->
  <rect x="50" y="140" width="400" height="176" rx="12" fill="#cce8e7" stroke="#0c6c6b" stroke-width="2"/>
  <path d="M 50,152 A 12,12 0 0 1 62,140 L 438,140 A 12,12 0 0 1 450,152 L 450,172 L 50,172 Z" fill="#0c6c6b"/>
  <text x="250" y="162" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">STAGE 1 — LAMINAR</text>

  <rect x="80" y="180" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="203" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Estimate V* — laminar element laws</text>
  <line x1="250" y1="216" x2="250" y2="226" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="80" y="228" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="251" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Solve for P′</text>
  <line x1="250" y1="264" x2="250" y2="274" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="80" y="276" width="340" height="36" rx="8" fill="white" stroke="#8ec4c3" stroke-width="1.5"/>
  <text x="250" y="299" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Update P and V</text>

  <!-- Arrow out of Stage 1 container -->
  <line x1="250" y1="316" x2="250" y2="332" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Stage 1 convergence check -->
  <polygon points="250,338 306,356 250,374 194,356" fill="white" stroke="#0c6c6b" stroke-width="1.5"/>
  <text x="250" y="360" text-anchor="middle" fill="#1d2a34" font-size="12" font-weight="700">Converged?</text>

  <!-- Loop-back Stage 1: No → back to Estimate V* -->
  <path d="M 306,356 L 460,356 L 460,198 L 420,198" fill="none" stroke="#5b6974" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahm)"/>
  <text x="463" y="279" fill="#5b6974" font-size="11" font-weight="600">No</text>

  <!-- Arrow Stage 1 → Stage 2: Yes -->
  <line x1="250" y1="374" x2="250" y2="390" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="257" y="385" fill="#5b6974" font-size="11" font-weight="600">Yes</text>

  <!-- ══ STAGE 2 CONTAINER ══ -->
  <rect x="50" y="392" width="400" height="176" rx="12" fill="#c8d8e8" stroke="#094a5c" stroke-width="2"/>
  <path d="M 50,404 A 12,12 0 0 1 62,392 L 438,392 A 12,12 0 0 1 450,404 L 450,424 L 50,424 Z" fill="#094a5c"/>
  <text x="250" y="414" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">STAGE 2 — NONLINEAR</text>

  <rect x="80" y="432" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="455" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Estimate V* — nonlinear element laws</text>
  <line x1="250" y1="468" x2="250" y2="478" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="80" y="480" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="503" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Solve for P′</text>
  <line x1="250" y1="516" x2="250" y2="526" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="80" y="528" width="340" height="36" rx="8" fill="white" stroke="#8aaac8" stroke-width="1.5"/>
  <text x="250" y="551" text-anchor="middle" fill="#1d2a34" font-size="12.5" font-weight="700">Update P and V</text>

  <!-- Arrow out of Stage 2 container -->
  <line x1="250" y1="568" x2="250" y2="584" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Stage 2 convergence check -->
  <polygon points="250,590 306,608 250,626 194,608" fill="white" stroke="#094a5c" stroke-width="1.5"/>
  <text x="250" y="612" text-anchor="middle" fill="#1d2a34" font-size="12" font-weight="700">Converged?</text>

  <!-- Loop-back Stage 2: No → back to Estimate V* -->
  <path d="M 306,608 L 460,608 L 460,450 L 420,450" fill="none" stroke="#5b6974" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahm)"/>
  <text x="463" y="531" fill="#5b6974" font-size="11" font-weight="600">No</text>

  <!-- Arrow Stage 2 → Output: Yes -->
  <line x1="250" y1="626" x2="250" y2="644" stroke="#1d2a34" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="257" y="638" fill="#5b6974" font-size="11" font-weight="600">Yes</text>

  <!-- OUTPUT -->
  <ellipse cx="250" cy="670" rx="110" ry="26" fill="#0c6c6b"/>
  <text x="250" y="676" text-anchor="middle" fill="white" font-size="14" font-weight="700">Output — P, V, ṁ</text>
</svg>
